<div class="login-page">
    <!-- Left panel — branding -->
    <div class="login-page__brand">
        <div class="login-page__brand-inner">
            <div class="login-page__logo">
                <svg viewBox="0 0 32 32" fill="none">
                    <rect width="32" height="32" rx="8" fill="var(--color-primary)" />
                    <path d="M8 22L16 10l8 12H8z" fill="white" opacity="0.9" />
                    <path d="M12 22l4-6 4 6H12z" fill="white" />
                </svg>
                <span>Posify</span>
            </div>
            <div class="login-page__brand-meta">
                <h2>Gestiona tu negocio<br />desde cualquier lugar.</h2>
                <p>La plataforma POS más intuitiva para empresas modernas.</p>
            </div>
        </div>
    </div>

    <!-- Right panel — form -->
    <div class="login-page__form-panel">
        <div class="login-page__form-wrap">
            <div class="login-page__header">
                <h1 class="login-page__title">Bienvenido de vuelta</h1>
                <p class="login-page__subtitle">Ingresa tus credenciales de acceso</p>
            </div>

            <form class="login-form" (ngSubmit)="onSubmit()" #f="ngForm">
                <!-- Email -->
                <div class="login-form__field">
                    <label class="login-form__label" for="login-email">Correo electrónico</label>
                    <div class="login-form__input-wrap">
                        <svg class="login-form__input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                            <polyline points="22,6 12,13 2,6" />
                        </svg>
                        <input id="login-email" class="login-form__input" type="email" placeholder="correo@empresa.com"
                            autocomplete="email" required [value]="email()"
                            (input)="email.set($any($event.target).value)" />
                    </div>
                </div>

                <!-- Password -->
                <div class="login-form__field">
                    <label class="login-form__label" for="login-password">Contraseña</label>
                    <div class="login-form__input-wrap">
                        <svg class="login-form__input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        <input id="login-password" class="login-form__input"
                            [type]="showPassword() ? 'text' : 'password'" placeholder="••••••••"
                            autocomplete="current-password" required [value]="password()"
                            (input)="password.set($any($event.target).value)" />
                        <button type="button" class="login-form__eye" (click)="showPassword.update(v => !v)"
                            [attr.aria-label]="showPassword() ? 'Ocultar' : 'Mostrar'">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                @if (showPassword()) {
                                <path
                                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22" />
                                } @else {
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                                }
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Error -->
                @if (error()) {
                <div class="login-form__error">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg>
                    {{ error() }}
                </div>
                }

                <ui-button type="submit" variant="primary" size="lg" [loading]="loading()"
                    style="width:100%;margin-top:var(--space-2)">
                    Iniciar sesión
                </ui-button>
            </form>
        </div>
    </div>
</div>
