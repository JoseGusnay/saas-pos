<form [formGroup]="brandForm" class="brand-form" (ngSubmit)="onSubmit()">
  <div class="form-section">
    <h3 class="form-section__title">Información General</h3>
    
    <div class="form-field">
      <label for="name" class="form-label">Nombre de la Marca</label>
      <input 
        id="name"
        type="text" 
        formControlName="name" 
        class="form-control" 
        placeholder="Ej: Johnnie Walker, Smirnoff..."
        [class.is-invalid]="brandForm.get('name')?.invalid && brandForm.get('name')?.touched">
      <div class="invalid-feedback" *ngIf="brandForm.get('name')?.invalid && brandForm.get('name')?.touched">
        El nombre es obligatorio (min. 2 caracteres).
      </div>
    </div>

    <div class="form-field">
      <label for="country" class="form-label">País de Origen</label>
      <input 
        id="country"
        type="text" 
        formControlName="country" 
        class="form-control" 
        placeholder="Ej: Escocia, Rusia, México...">
    </div>

    <div class="form-field">
      <label class="form-label">Estado</label>
      <select formControlName="status" class="form-control">
        <option value="ACTIVE">Activa</option>
        <option value="INACTIVE">Inactiva</option>
      </select>
    </div>
  </div>
</form>
