<form [formGroup]="presentationForm" (ngSubmit)="onSubmit()" class="presentation-form">
  <fieldset [disabled]="isSubmitting" class="form-fieldset">
    <div class="form-group" [class.has-error]="presentationForm.get('name')?.invalid && presentationForm.get('name')?.touched">
      <label for="name">Nombre de la presentación *</label>
      <input id="name" type="text" formControlName="name" placeholder="Ej. Botella, Caja, Six-pack">
      @if (presentationForm.get('name')?.invalid && presentationForm.get('name')?.touched) {
        <small class="error-msg">
          <ng-icon name="lucideAlertCircle"></ng-icon>
          El nombre es requerido (mín. 2 caracteres)
        </small>
      }
    </div>

    <div class="form-group">
      <label for="description">Descripción</label>
      <textarea id="description" formControlName="description" rows="3" placeholder="Ej. Empaque de cartón de 12 unidades"></textarea>
    </div>

    <div class="form-switches">
      <div class="form-check">
        <input id="isActive" type="checkbox" formControlName="isActive">
        <label for="isActive">Presentación activa</label>
      </div>
    </div>
  </fieldset>
</form>
