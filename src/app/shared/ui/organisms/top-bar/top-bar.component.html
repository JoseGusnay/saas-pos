<header class="top-bar">

    <!-- Left: toggle + title -->
    <div class="top-bar__left">
        <button class="top-bar__icon-btn" type="button" (click)="toggleSidebar.emit()"
            [attr.aria-label]="sidebarCollapsed() ? 'Expandir sidebar' : 'Colapsar sidebar'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.75" stroke-linecap="round" aria-hidden="true" class="top-bar__svg">
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
        </button>

        <div class="top-bar__divider" aria-hidden="true"></div>

        <h1 class="top-bar__title">{{ pageTitle() }}</h1>
    </div>

    <!-- Center: Search -->
    <div class="top-bar__search-wrap">
        <label class="top-bar__search" for="global-search">
            <svg class="top-bar__search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.75" stroke-linecap="round" aria-hidden="true">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
            </svg>
            <input id="global-search" class="top-bar__search-input" type="search" placeholder="Buscar…"
                autocomplete="off" [attr.aria-label]="'Búsqueda global'" />
            <kbd class="top-bar__search-kbd">⌘K</kbd>
        </label>
    </div>

    <!-- Right: Actions -->
    <div class="top-bar__actions">

        <!-- Theme toggle -->
        <button class="top-bar__icon-btn" type="button" (click)="themeService.toggle()"
            [attr.aria-label]="themeService.isDark() ? 'Modo claro' : 'Modo oscuro'">
            @if (themeService.isDark()) {
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.75" stroke-linecap="round" class="top-bar__svg" aria-hidden="true">
                <circle cx="12" cy="12" r="5" />
                <line x1="12" y1="1" x2="12" y2="3" />
                <line x1="12" y1="21" x2="12" y2="23" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                <line x1="1" y1="12" x2="3" y2="12" />
                <line x1="21" y1="12" x2="23" y2="12" />
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </svg>
            } @else {
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.75" stroke-linecap="round" class="top-bar__svg" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
            }
        </button>

        <!-- Notifications -->
        <button class="top-bar__icon-btn top-bar__icon-btn--with-dot" type="button" aria-label="Notificaciones">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.75" stroke-linecap="round" class="top-bar__svg" aria-hidden="true">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <span class="top-bar__dot" aria-hidden="true"></span>
        </button>

        <div class="top-bar__divider" aria-hidden="true"></div>

        <!-- User Avatar -->
        <button class="top-bar__avatar" type="button" aria-label="Menú de usuario">
            A
        </button>

    </div>

</header>
