<div class="auth-layout">
    <div class="auth-card">
        <div class="auth-card__header" *ngIf="title || subtitle">
            <h1 class="auth-card__title" *ngIf="title">{{ title }}</h1>
            <p class="auth-card__subtitle" *ngIf="subtitle">{{ subtitle }}</p>
        </div>
        <div class="auth-card__content">
            <ng-content></ng-content>
        </div>
    </div>
</div>
