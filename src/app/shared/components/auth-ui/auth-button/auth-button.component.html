<button [type]="type" class="auth-button" [class.auth-button--primary]="variant === 'primary'"
    [class.auth-button--secondary]="variant === 'secondary'" [class.auth-button--loading]="isLoading"
    [disabled]="isDisabled || isLoading" (click)="handleClick($event)">

    <span class="auth-button__content">
        <app-spinner *ngIf="isLoading"></app-spinner>
        <ng-content>{{ text }}</ng-content>
    </span>
</button>
