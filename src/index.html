<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>SaasPos</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>
  <app-root>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .splash {
        position: fixed;
        inset: 0;
        background: #080a12;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', -apple-system, sans-serif;
        z-index: 9999;
        overflow: hidden;
      }

      /* Aurora glow */
      .splash__aurora {
        position: absolute;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(ellipse at center,
            rgba(99, 75, 230, 0.18) 0%,
            rgba(99, 75, 230, 0.06) 40%,
            transparent 70%);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation: aurora-breathe 6s ease-in-out infinite;
        pointer-events: none;
      }

      /* Center content */
      .splash__inner {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.75rem;
        animation: content-enter 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* Geometric icon mark */
      .splash__icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: rgba(99, 75, 230, 0.12);
        border: 1px solid rgba(99, 75, 230, 0.2);
        color: rgba(139, 116, 255, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Ring spinner */
      .splash__ring {
        width: 28px;
        height: 28px;
        border: 2px solid rgba(255, 255, 255, 0.06);
        border-top-color: rgba(139, 116, 255, 0.7);
        border-radius: 50%;
        animation: spin 0.85s linear infinite;
      }

      /* Caption */
      .splash__label {
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.2);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes aurora-breathe {

        0%,
        100% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }

        50% {
          opacity: 0.7;
          transform: translate(-50%, -50%) scale(1.15);
        }
      }

      @keyframes content-enter {
        from {
          opacity: 0;
          transform: translateY(14px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>

    <div class="splash">
      <div class="splash__aurora"></div>
      <div class="splash__inner">
        <div class="splash__icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7l10 5 10-5-10-5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
            <path d="M2 17l10 5 10-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" />
            <path d="M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </div>
        <div class="splash__ring"></div>
        <span class="splash__label">Verificando espacio de trabajo</span>
      </div>
    </div>
  </app-root>
</body>

</html>
