name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }} # Opcional
          port: 22
          script: |
            # Crear directorio si no existe
            mkdir -p /home/${{ secrets.VPS_USERNAME }}/saas-pos
            cd /home/${{ secrets.VPS_USERNAME }}/saas-pos
            
            # Clonar o actualizar reposo
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/JoseGusnay/saas-pos.git .
            fi
            
            # Construir la imagen de Angular+Nginx y levantarla en segundo plano
            docker compose up -d --build
            
            # Limpiar imágenes viejas
            docker image prune -f
